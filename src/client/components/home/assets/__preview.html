<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"/><style>
body{margin:0}.screen{position:relative;min-height:100dvh;overflow:hidden;background:linear-gradient(180deg,#e8b04b 0%,#dd9440 16%,#c1713a 32%,#2c4a52 50%,#1c333c 72%,#14252b 100%)}
.sun{position:absolute;left:50%;top:8%;width:10rem;height:10rem;transform:translateX(-50%);opacity:.9;border-radius:9999px;z-index:0;background:radial-gradient(circle,#f4e3b2 0%,#ecc36a 45%,rgba(236,195,106,.25) 70%,transparent 72%)}
.plaza-mountain-scene{position:absolute;left:0;right:0;bottom:0;z-index:2;height:clamp(18rem,62vh,48rem);overflow:hidden;-webkit-mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.4) 5%,rgba(0,0,0,.78) 10%,black 16%);mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.4) 5%,rgba(0,0,0,.78) 10%,black 16%)}
.plaza-mountain-scene svg{display:block;width:100%;height:100%}
</style></head><body><div class="screen"><div class="sun"></div><div class="plaza-mountain-scene" id="s"></div></div><script>fetch('plazaHomeScreenMountainScene.svg').then(r=>r.text()).then(t=>s.innerHTML=t)</script></body></html>
